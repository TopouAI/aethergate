openapi: 3.1.0
info:
  title: AetherGate Webhooks API
  version: 0.1.0
  description: Enterprise webhook endpoint lifecycle, event subscriptions, one-time signing-secret reveal, queued tests, delivery evidence, retries, and replay. Network dispatch and Vault secret resolution belong to the isolated webhook worker integration gate.
servers: [{ url: http://localhost:8080 }]
tags: [{ name: Webhooks }]
paths:
  /api/v1/webhooks:
    get:
      operationId: listWebhooks
      tags: [Webhooks]
      parameters:
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [all, active, disabled] } }
        - { name: event, in: query, schema: { oneOf: [{ $ref: "#/components/schemas/WebhookEventType" }, { type: string, const: all }] } }
      responses:
        "200": { description: Webhook endpoint list without secret material., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookListResponse" } } } }
    post:
      operationId: createWebhook
      tags: [Webhooks]
      summary: Create an active endpoint and reveal its signing secret exactly once
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateWebhookRequest" } } } }
      responses:
        "201": { description: Created endpoint and one-time signing secret., content: { application/json: { schema: { $ref: "#/components/schemas/CreatedWebhookResponse" } } } }
        "422": { description: Invalid destination, subscription, filter, sampling, retry, or timeout settings., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
  /api/v1/webhooks/{webhookId}/enable:
    post:
      operationId: enableWebhook
      tags: [Webhooks]
      parameters:
        - { name: webhookId, in: path, required: true, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
      responses: { "200": { description: Active endpoint., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookResponse" } } } } }
  /api/v1/webhooks/{webhookId}/disable:
    post:
      operationId: disableWebhook
      tags: [Webhooks]
      parameters:
        - { name: webhookId, in: path, required: true, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
      responses: { "200": { description: Disabled endpoint., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookResponse" } } } } }
  /api/v1/webhooks/{webhookId}/test:
    post:
      operationId: queueWebhookTest
      tags: [Webhooks]
      summary: Queue a test event for the isolated webhook worker
      parameters:
        - { name: webhookId, in: path, required: true, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/WebhookTestRequest" } } } }
      responses:
        "202": { description: Test delivery accepted by the worker boundary., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookDeliveryResponse" } } } }
        "409": { description: Endpoint is disabled., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
  /api/v1/webhook-deliveries:
    get:
      operationId: listWebhookDeliveries
      tags: [Webhooks]
      parameters:
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: webhookId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [all, pending, delivering, succeeded, failed, dead_letter] } }
        - { name: eventType, in: query, schema: { oneOf: [{ $ref: "#/components/schemas/WebhookEventType" }, { type: string, const: all }] } }
      responses:
        "200": { description: Delivery history with retry and replay evidence., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookDeliveryListResponse" } } } }
  /api/v1/webhook-deliveries/{deliveryId}/retry:
    post:
      operationId: retryWebhookDelivery
      tags: [Webhooks]
      summary: Queue the next configured attempt for a failed delivery
      parameters:
        - { name: deliveryId, in: path, required: true, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
      responses:
        "202": { description: Retry accepted., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookDeliveryResponse" } } } }
        "422": { description: Delivery is not retryable or exhausted., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
  /api/v1/webhook-deliveries/{deliveryId}/replay:
    post:
      operationId: replayWebhookDelivery
      tags: [Webhooks]
      summary: Queue a manual replay with a new idempotent event ID and lineage to the source delivery
      parameters:
        - { name: deliveryId, in: path, required: true, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
      responses:
        "202": { description: Replay accepted., content: { application/json: { schema: { $ref: "#/components/schemas/WebhookDeliveryResponse" } } } }
        "422": { description: Pending deliveries cannot be replayed., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
components:
  schemas:
    WebhookEventType:
      type: string
      enum: [request.completed, request.failed, alert.triggered, alert.resolved, budget.threshold_reached, api_key.revoked, provider.health_changed]
    WebhookPropertyFilter:
      type: object
      required: [key, value]
      properties:
        key: { type: string, minLength: 1 }
        value: { type: string, minLength: 1 }
    WebhookEndpoint:
      type: object
      required: [id, organizationId, name, status, destination, version, events, sampleRate, includeData, propertyFilters, signingSecretPrefix, maxAttempts, timeoutSeconds, successCount, failureCount, createdAt, updatedAt]
      properties:
        id: { type: string }
        organizationId: { type: string }
        name: { type: string }
        status: { type: string, enum: [active, disabled] }
        destination: { type: string, format: uri }
        version: { type: string }
        events: { type: array, minItems: 1, items: { $ref: "#/components/schemas/WebhookEventType" } }
        sampleRate: { type: number, minimum: 0.1, maximum: 100 }
        includeData: { type: boolean }
        propertyFilters: { type: array, maxItems: 20, items: { $ref: "#/components/schemas/WebhookPropertyFilter" } }
        signingSecretPrefix: { type: string, description: Non-secret identifier prefix only. }
        maxAttempts: { type: integer, minimum: 1, maximum: 10 }
        timeoutSeconds: { type: integer, minimum: 1, maximum: 30 }
        successCount: { type: integer, minimum: 0 }
        failureCount: { type: integer, minimum: 0 }
        lastDeliveredAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    WebhookDelivery:
      type: object
      required: [id, organizationId, webhookId, webhookName, eventId, eventType, status, trigger, attempt, maxAttempts, durationMs, errorMessage, createdAt]
      properties:
        id: { type: string }
        organizationId: { type: string }
        webhookId: { type: string }
        webhookName: { type: string }
        eventId: { type: string, description: Idempotency and replay-protection identifier. }
        eventType: { $ref: "#/components/schemas/WebhookEventType" }
        status: { type: string, enum: [pending, delivering, succeeded, failed, dead_letter] }
        trigger: { type: string, enum: [event, test, retry, replay] }
        attempt: { type: integer, minimum: 1 }
        maxAttempts: { type: integer, minimum: 1, maximum: 10 }
        responseStatus: { type: [integer, "null"], minimum: 100, maximum: 599 }
        durationMs: { type: integer, minimum: 0 }
        errorMessage: { type: string }
        nextRetryAt: { type: [string, "null"], format: date-time }
        deliveredAt: { type: [string, "null"], format: date-time }
        replayOfId: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    CreateWebhookRequest:
      type: object
      required: [organizationId, name, destination, events, sampleRate, includeData, propertyFilters, maxAttempts, timeoutSeconds]
      properties:
        organizationId: { type: string }
        name: { type: string, minLength: 1 }
        destination: { type: string, format: uri }
        events: { type: array, minItems: 1, items: { $ref: "#/components/schemas/WebhookEventType" } }
        sampleRate: { type: number, minimum: 0.1, maximum: 100 }
        includeData: { type: boolean }
        propertyFilters: { type: array, maxItems: 20, items: { $ref: "#/components/schemas/WebhookPropertyFilter" } }
        maxAttempts: { type: integer, minimum: 1, maximum: 10 }
        timeoutSeconds: { type: integer, minimum: 1, maximum: 30 }
    WebhookTestRequest:
      type: object
      required: [eventType]
      properties: { eventType: { $ref: "#/components/schemas/WebhookEventType" } }
    WebhookResponse: { type: object, required: [data, meta], properties: { data: { $ref: "#/components/schemas/WebhookEndpoint" }, meta: { type: object, additionalProperties: { type: string } } } }
    WebhookListResponse: { type: object, required: [data, meta], properties: { data: { type: array, items: { $ref: "#/components/schemas/WebhookEndpoint" } }, meta: { type: object, additionalProperties: true } } }
    WebhookDeliveryResponse: { type: object, required: [data, meta], properties: { data: { $ref: "#/components/schemas/WebhookDelivery" }, meta: { type: object, additionalProperties: { type: string } } } }
    WebhookDeliveryListResponse: { type: object, required: [data, meta], properties: { data: { type: array, items: { $ref: "#/components/schemas/WebhookDelivery" } }, meta: { type: object, additionalProperties: true } } }
    CreatedWebhookResponse:
      type: object
      required: [data, signingSecret, meta]
      properties:
        data: { $ref: "#/components/schemas/WebhookEndpoint" }
        signingSecret: { type: string, writeOnly: true, description: Returned only by the create response. }
        meta: { type: object, additionalProperties: { type: string } }
    ErrorResponse: { type: object, required: [error], properties: { error: { type: object, required: [code, message], properties: { code: { type: string }, message: { type: string } } } } }
