openapi: 3.1.0
info:
  title: AetherGate Enterprise Control API
  version: 0.1.0
  description: Executable development contract for organization and gateway credential lifecycle endpoints.
servers:
  - url: http://localhost:8080
tags:
  - name: Organizations
  - name: API keys
paths:
  /api/v1/organizations:
    get:
      operationId: listOrganizations
      tags: [Organizations]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [all, active, provisioning, suspended] }
      responses:
        "200":
          description: Filtered organizations.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrganizationListResponse" }
    post:
      operationId: createOrganization
      tags: [Organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOrganizationRequest" }
      responses:
        "201":
          description: Organization created in provisioning state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrganizationResponse" }
        "409":
          description: Organization slug already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: Organization data is invalid.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /api/v1/organizations/{organizationId}:
    get:
      operationId: getOrganization
      tags: [Organizations]
      parameters:
        - name: organizationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Organization detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrganizationResponse" }
        "404":
          description: Organization not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /api/v1/api-keys:
    get:
      operationId: listAPIKeys
      tags: [API keys]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [all, active, expired, revoked] }
      responses:
        "200":
          description: Public API-key records without secret material.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKeyListResponse" }
    post:
      operationId: createAPIKey
      tags: [API keys]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAPIKeyRequest" }
      responses:
        "201":
          description: API key created; the secret is returned once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateAPIKeyResponse" }
        "422":
          description: Key scope is invalid.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /api/v1/api-keys/{apiKeyId}/revoke:
    post:
      operationId: revokeAPIKey
      tags: [API keys]
      parameters:
        - name: apiKeyId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Revoked public API-key record.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKeyResponse" }
        "404":
          description: API key not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: API key is not active.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
components:
  schemas:
    OrganizationStatus:
      type: string
      enum: [active, provisioning, suspended]
    Organization:
      type: object
      required: [id, name, slug, status, plan, region, workspaces, projects, members, monthlyCostUsd, budgetUsd, requests, owner, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/OrganizationStatus" }
        plan: { type: string }
        region: { type: string }
        workspaces: { type: integer, minimum: 0 }
        projects: { type: integer, minimum: 0 }
        members: { type: integer, minimum: 0 }
        monthlyCostUsd: { type: number, minimum: 0 }
        budgetUsd: { type: number, minimum: 0 }
        requests: { type: integer, minimum: 0 }
        owner: { type: string }
        createdAt: { type: string, format: date }
    CreateOrganizationRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string }
        plan: { type: string }
        region: { type: string }
        owner: { type: string }
    OrganizationResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/Organization" }
        meta: { type: object, additionalProperties: { type: string } }
    OrganizationListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Organization" }
        meta: { $ref: "#/components/schemas/ListMeta" }
    APIKeyStatus:
      type: string
      enum: [active, expired, revoked]
    APIKey:
      type: object
      required: [id, name, prefix, project, status, models, rpm, tpm, spendUsd, createdBy, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        prefix: { type: string, description: Non-secret identification prefix. }
        project: { type: string }
        status: { $ref: "#/components/schemas/APIKeyStatus" }
        models:
          type: array
          minItems: 1
          items: { type: string }
        rpm: { type: integer, minimum: 1 }
        tpm: { type: integer, minimum: 1 }
        spendUsd: { type: number, minimum: 0 }
        createdBy: { type: string }
        createdAt: { type: string, format: date }
        lastUsedAt: { type: [string, "null"], format: date-time }
        expiresAt: { type: [string, "null"], format: date }
    CreateAPIKeyRequest:
      type: object
      required: [name, project, models]
      properties:
        name: { type: string, minLength: 1 }
        project: { type: string, minLength: 1 }
        models:
          type: array
          minItems: 1
          items: { type: string }
        rpm: { type: integer, minimum: 1 }
        tpm: { type: integer, minimum: 1 }
        createdBy: { type: string }
        expiresAt: { type: [string, "null"], format: date }
    APIKeyResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: "#/components/schemas/APIKey" }
    CreateAPIKeyResponse:
      type: object
      required: [data, secret, meta]
      properties:
        data: { $ref: "#/components/schemas/APIKey" }
        secret: { type: string, writeOnly: true, description: One-time plaintext gateway credential. }
        meta:
          type: object
          required: [source, secretVisibility]
          properties:
            source: { type: string }
            secretVisibility: { type: string, const: one-time }
    APIKeyListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/APIKey" }
        meta: { $ref: "#/components/schemas/ListMeta" }
    ListMeta:
      type: object
      required: [count, total, source]
      properties:
        count: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 0 }
        source: { type: string }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
