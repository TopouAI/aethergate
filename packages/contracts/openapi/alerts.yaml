openapi: 3.1.0
info:
  title: AetherGate Alerts API
  version: 0.1.0
  description: Alert rule lifecycle, incident history, and deterministic dry-run evaluation. Notification delivery workers and recovery-event processing are separate integration gates.
servers: [{ url: http://localhost:8080 }]
tags: [{ name: Alerts }]
paths:
  /api/v1/alerts:
    get:
      operationId: listAlerts
      tags: [Alerts]
      parameters:
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [all, draft, enabled, disabled] } }
        - { name: severity, in: query, schema: { type: string, enum: [all, info, warning, critical] } }
      responses:
        "200": { description: Alert-rule list., content: { application/json: { schema: { $ref: "#/components/schemas/AlertRuleListResponse" } } } }
    post:
      operationId: createAlert
      tags: [Alerts]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateAlertRequest" } } } }
      responses:
        "201": { description: Draft alert rule., content: { application/json: { schema: { $ref: "#/components/schemas/AlertRuleResponse" } } } }
        "422": { description: Invalid alert condition or delivery settings., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
  /api/v1/alerts/{alertId}/enable:
    post:
      operationId: enableAlert
      tags: [Alerts]
      parameters:
        - { name: alertId, in: path, required: true, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
      responses: { "200": { description: Enabled alert rule., content: { application/json: { schema: { $ref: "#/components/schemas/AlertRuleResponse" } } } } }
  /api/v1/alerts/{alertId}/disable:
    post:
      operationId: disableAlert
      tags: [Alerts]
      parameters:
        - { name: alertId, in: path, required: true, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: string } }
      responses: { "200": { description: Disabled alert rule., content: { application/json: { schema: { $ref: "#/components/schemas/AlertRuleResponse" } } } } }
  /api/v1/alert-incidents:
    get:
      operationId: listAlertIncidents
      tags: [Alerts]
      parameters:
        - { name: organizationId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [all, open, acknowledged, resolved] } }
        - { name: severity, in: query, schema: { type: string, enum: [all, info, warning, critical] } }
      responses:
        "200": { description: Alert-incident history., content: { application/json: { schema: { $ref: "#/components/schemas/AlertIncidentListResponse" } } } }
  /api/v1/alerts/evaluate:
    post:
      operationId: evaluateAlerts
      tags: [Alerts]
      summary: Evaluate enabled rules without creating incidents or delivering notifications
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AlertEvaluationRequest" } } } }
      responses:
        "200": { description: Dry-run alert decision., content: { application/json: { schema: { $ref: "#/components/schemas/AlertEvaluationResponse" } } } }
components:
  schemas:
    AlertRule:
      type: object
      required: [id, organizationId, name, status, metric, operator, threshold, window, cooldownMinutes, severity, channels, filters, incidentCount, createdAt, updatedAt]
      properties:
        id: { type: string }
        organizationId: { type: string }
        name: { type: string }
        status: { type: string, enum: [draft, enabled, disabled] }
        metric: { $ref: "#/components/schemas/AlertMetric" }
        operator: { type: string, enum: [gt, gte, lt, lte] }
        threshold: { type: number }
        window: { type: string, enum: [5m, 15m, 1h, 24h] }
        cooldownMinutes: { type: integer, minimum: 0, maximum: 10080 }
        severity: { $ref: "#/components/schemas/AlertSeverity" }
        channels:
          type: array
          minItems: 1
          items: { type: string, enum: [in_app, email, webhook, slack, teams] }
        filters: { type: object, additionalProperties: { type: string } }
        incidentCount: { type: integer, minimum: 0 }
        lastTriggeredAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AlertIncident:
      type: object
      required: [id, organizationId, ruleId, ruleName, status, severity, metric, observedValue, threshold, summary, startedAt]
      properties:
        id: { type: string }
        organizationId: { type: string }
        ruleId: { type: string }
        ruleName: { type: string }
        status: { type: string, enum: [open, acknowledged, resolved] }
        severity: { $ref: "#/components/schemas/AlertSeverity" }
        metric: { $ref: "#/components/schemas/AlertMetric" }
        observedValue: { type: number }
        threshold: { type: number }
        summary: { type: string }
        startedAt: { type: string, format: date-time }
        resolvedAt: { type: [string, "null"], format: date-time }
    CreateAlertRequest:
      type: object
      required: [organizationId, name, metric, operator, threshold, window, cooldownMinutes, severity, channels, filters]
      properties:
        organizationId: { type: string }
        name: { type: string, minLength: 1 }
        metric: { $ref: "#/components/schemas/AlertMetric" }
        operator: { type: string, enum: [gt, gte, lt, lte] }
        threshold: { type: number }
        window: { type: string, enum: [5m, 15m, 1h, 24h] }
        cooldownMinutes: { type: integer, minimum: 0, maximum: 10080 }
        severity: { $ref: "#/components/schemas/AlertSeverity" }
        channels:
          type: array
          minItems: 1
          items: { type: string, enum: [in_app, email, webhook, slack, teams] }
        filters: { type: object, additionalProperties: { type: string } }
    AlertEvaluationRequest:
      type: object
      required: [organizationId, metric, value, dimensions]
      properties:
        organizationId: { type: string }
        metric: { $ref: "#/components/schemas/AlertMetric" }
        value: { type: number }
        dimensions: { type: object, additionalProperties: { type: string } }
    AlertEvaluationMatch:
      type: object
      required: [ruleId, ruleName, severity, operator, threshold, observedValue, conditionMet, inCooldown, wouldTrigger, channels, reason]
      properties:
        ruleId: { type: string }
        ruleName: { type: string }
        severity: { $ref: "#/components/schemas/AlertSeverity" }
        operator: { type: string, enum: [gt, gte, lt, lte] }
        threshold: { type: number }
        observedValue: { type: number }
        conditionMet: { type: boolean }
        inCooldown: { type: boolean }
        wouldTrigger: { type: boolean }
        channels: { type: array, items: { type: string } }
        reason: { type: string }
    AlertEvaluation:
      type: object
      required: [triggered, mode, matches]
      properties:
        triggered: { type: boolean }
        mode: { type: string, const: dry-run }
        matches: { type: array, items: { $ref: "#/components/schemas/AlertEvaluationMatch" } }
    AlertMetric: { type: string, enum: [cost, error_rate, latency, requests, tokens, budget_utilization] }
    AlertSeverity: { type: string, enum: [info, warning, critical] }
    AlertRuleResponse: { type: object, required: [data, meta], properties: { data: { $ref: "#/components/schemas/AlertRule" }, meta: { type: object, additionalProperties: { type: string } } } }
    AlertRuleListResponse: { type: object, required: [data, meta], properties: { data: { type: array, items: { $ref: "#/components/schemas/AlertRule" } }, meta: { type: object, additionalProperties: true } } }
    AlertIncidentListResponse: { type: object, required: [data, meta], properties: { data: { type: array, items: { $ref: "#/components/schemas/AlertIncident" } }, meta: { type: object, additionalProperties: true } } }
    AlertEvaluationResponse: { type: object, required: [data, meta], properties: { data: { $ref: "#/components/schemas/AlertEvaluation" }, meta: { type: object, additionalProperties: { type: string } } } }
    ErrorResponse: { type: object, required: [error], properties: { error: { type: object, required: [code, message], properties: { code: { type: string }, message: { type: string } } } } }
