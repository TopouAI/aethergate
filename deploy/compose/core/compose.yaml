name: aethergate-stack

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: aethergate-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      LITELLM_DB_USER: litellm_user
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD}
      LITELLM_DB_NAME: litellm
      AETHERGATE_DB_USER: aethergate_user
      AETHERGATE_DB_PASSWORD: ${AETHERGATE_DB_PASSWORD}
      AETHERGATE_DB_NAME: aethergate
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-300}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-2GB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-8MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
      - -c
      - jit=off
      - -c
      - wal_compression=on
      - -c
      - checkpoint_timeout=15min
      - -c
      - max_wal_size=${POSTGRES_MAX_WAL_SIZE:-2GB}
      - -c
      - statement_timeout=${POSTGRES_STATEMENT_TIMEOUT:-120s}
      - -c
      - idle_in_transaction_session_timeout=${POSTGRES_IDLE_TX_TIMEOUT:-60s}
      - -c
      - log_min_duration_statement=${POSTGRES_SLOW_QUERY_MS:-2000}
      - -c
      - listen_addresses=*
    ports:
      # Direct PostgreSQL is local-only. It is intended for migrations,
      # backups and administration through an SSH tunnel.
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    shm_size: ${POSTGRES_SHM_SIZE:-512mb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - aethergate

  pgbouncer:
    image: ${PGBOUNCER_IMAGE:-edoburu/pgbouncer:v1.25.2-p0}
    container_name: aethergate-pgbouncer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD}
      AETHERGATE_DB_PASSWORD: ${AETHERGATE_DB_PASSWORD}
    ports:
      # Keep local-only by default. AetherGate containers use pgbouncer:5432.
      # Local developers should connect through an SSH tunnel to host port 6432.
      - "${PGBOUNCER_BIND_IP:-127.0.0.1}:${PGBOUNCER_HOST_PORT:-6432}:5432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    secrets:
      - source: pgbouncer_users
        target: pgbouncer_users
        mode: 0444
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=\"$${LITELLM_DB_PASSWORD}\" pg_isready -h 127.0.0.1 -p 5432 -U litellm_user -d litellm"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    security_opt:
      - no-new-privileges:true
    networks:
      - aethergate

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: aethergate-redis
    restart: unless-stopped
    env_file:
      - .env
    command:
      - sh
      - -ec
      - |
        exec redis-server \
          --appendonly yes \
          --appendfsync everysec \
          --requirepass "$${REDIS_PASSWORD}" \
          --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - aethergate

  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm-non_root:v1.92.0}
    container_name: aethergate-litellm
    restart: unless-stopped
    env_file:
      - .env
    command:
      - "--config=/app/litellm-config.yaml"
      - "--port=4000"
      - "--num_workers=${LITELLM_NUM_WORKERS:-1}"
    environment:
      # Direct PostgreSQL is the safe default for LiteLLM schema initialization
      # and upgrades. Set LITELLM_DB_HOST=pgbouncer after validation if desired.
      DATABASE_URL: "postgresql://litellm_user:${LITELLM_DB_PASSWORD}@${LITELLM_DB_HOST:-postgres}:${LITELLM_DB_PORT:-5432}/litellm?connection_limit=${LITELLM_DB_CONNECTION_LIMIT:-20}&pool_timeout=30"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      STORE_MODEL_IN_DB: "True"
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      # Public for development, as requested. Restrict TCP/4000 in the cloud
      # security group to your own public IP. Use Nginx + HTTPS for production.
      - "${LITELLM_BIND_IP:-0.0.0.0}:${LITELLM_HOST_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/litellm-config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5)\""
        ]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s
    stop_grace_period: 620s
    security_opt:
      - no-new-privileges:true
    networks:
      - aethergate

volumes:
  postgres_data:
    name: aethergate_postgres_data
  redis_data:
    name: aethergate_redis_data

networks:
  aethergate:
    name: aethergate_network

secrets:
  pgbouncer_users:
    file: ./secrets/pgbouncer_users.txt
