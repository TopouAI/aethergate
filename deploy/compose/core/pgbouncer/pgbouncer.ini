[databases]
; LiteLLM is configured with session pooling for maximum Prisma compatibility.
; The default stack still connects LiteLLM directly to PostgreSQL during the
; initial installation and upgrades. To test PgBouncer later, set:
;   LITELLM_DB_HOST=pgbouncer
;   LITELLM_DB_PORT=5432
litellm = host=postgres port=5432 dbname=litellm pool_mode=session pool_size=60 reserve_pool_size=10

; AetherGate application traffic uses transaction pooling.
; Database migrations must use the direct postgres:5432 connection instead.
aethergate = host=postgres port=5432 dbname=aethergate pool_mode=transaction pool_size=100 reserve_pool_size=20

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

auth_type = scram-sha-256
auth_file = /run/secrets/pgbouncer_users

admin_users = pgbouncer_admin
stats_users = pgbouncer_admin

pool_mode = transaction
max_client_conn = 2000
default_pool_size = 50
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 5

max_db_connections = 180
max_db_client_connections = 1800

max_prepared_statements = 200
server_reset_query = DISCARD ALL
server_check_delay = 30
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
query_wait_timeout = 120
cancel_wait_timeout = 10
client_login_timeout = 30
idle_transaction_timeout = 60
client_idle_timeout = 0

ignore_startup_parameters = extra_float_digits

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
log_stats = 1
stats_period = 60

pidfile = /var/run/pgbouncer/pgbouncer.pid
unix_socket_dir =
